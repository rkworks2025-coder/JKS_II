<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JKS-II</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-title">JKS-II</div>
  <div class="area-tabs">
    <button class="area-tab active" data-area="tama" onclick="switchArea('tama')">多摩</button>
    <button class="area-tab" data-area="fuchu" onclick="switchArea('fuchu')">府中</button>
  </div>
  <div class="header-area" id="headerArea">多摩市</div>
  <div class="header-stats">
    <div class="stat-item">standby <span id="cnt-standby">—</span></div>
    <div class="stat-item">checked <span id="cnt-checked">—</span></div>
  </div>
  <button id="updateBtn" class="update-btn" onclick="triggerUpdate()">更新</button>
</header>

<div class="main" id="mainArea">
  <div class="grid-transform" id="gridTransform">
    <div class="hex-grid" id="hexGrid"></div>
  </div>
</div>

<div id="loadingOverlay">
  <div class="loading-text">LOADING...</div>
  <div class="loading-sub">データを取得中</div>
</div>

<div class="minimap" id="minimap">
  <canvas id="minimapCanvas"></canvas>
  <div class="minimap-viewport" id="minimapViewport"></div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>

<div class="detail-panel" id="detailPanel">
  <div class="detail-handle"></div>
  <button class="detail-nav" id="navBtn" onclick="openNav()">▶ ナビ</button>
  <div class="detail-station" id="detailStation">—</div>
  <div class="detail-cd" id="detailCd">—</div>
  <div class="detail-vehicles" id="detailVehicles"></div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
