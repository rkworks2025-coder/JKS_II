<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JKS-II マップ形式プレビュー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #070b12; font-family: 'Helvetica Neue', sans-serif; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(7,11,18,0.97);
    border-bottom: 1px solid #1a2d40;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    z-index: 1000;
  }
  .header-title { font-size: 13px; font-weight: bold; color: #00e5a0; letter-spacing: 0.12em; }
  .area-tabs { display: flex; gap: 3px; margin-left: 6px; }
  .area-tab { padding: 3px 7px; font-size: 10px; border: 1px solid #2a3d52; color: #e8f4ff; background: transparent; border-radius: 4px; cursor: pointer; }
  .area-tab.active { border-color: #00e5a0; color: #00e5a0; background: rgba(0,229,160,0.08); }
  .scan-btn { margin-left: auto; padding: 4px 10px; font-size: 11px; border: 1px solid #ff4d4d; color: #ff4d4d; background: transparent; border-radius: 4px; cursor: pointer; }
  .update-btn { padding: 4px 8px; font-size: 11px; border: 1px solid #00e5a0; color: #00e5a0; background: transparent; border-radius: 4px; cursor: pointer; }

  #map { position: fixed; top: 52px; bottom: 0; left: 0; right: 0; }

  /* 凡例 */
  .legend {
    position: fixed; bottom: 20px; left: 12px;
    background: rgba(7,11,18,0.92); border: 1px solid #1a2d40;
    border-radius: 6px; padding: 8px 12px; z-index: 1000;
    font-size: 10px; color: #e8f4ff;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="header-title">JKS-II</div>
  <div class="area-tabs">
    <button class="area-tab active">多摩</button>
    <button class="area-tab">府中</button>
  </div>
  <button class="update-btn">更新</button>
  <button class="scan-btn">スキャン</button>
</header>

<div id="map"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00e5a0;box-shadow:0 0 4px rgba(0,229,160,0.8)"></div>standby</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff4d8d"></div>checked</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3d9bff"></div>7days</div>
  <div class="legend-item"><div class="legend-dot" style="background:#445060"></div>stopped</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffe04d"></div>現在地</div>
</div>

<script>
const STATIONS = [
  {name:"多摩一ノ宮", lat:35.65221, lng:139.44115, status:"standby", scan:1},
  {name:"ＡＯＫＩ聖蹟桜ヶ丘店", lat:35.65185, lng:139.43947, status:"standby", scan:2},
  {name:"聖蹟桜ヶ丘モーリン駐車場", lat:35.64960, lng:139.44426, status:"checked"},
  {name:"タイムズ聖蹟桜ヶ丘駅前交差点", lat:35.65051, lng:139.44547, status:"standby", scan:3},
  {name:"聖蹟桜ヶ丘駅北第２", lat:35.65252, lng:139.44595, status:"sevenday"},
  {name:"パトリア桜ヶ丘", lat:35.65285, lng:139.44469, status:"standby"},
  {name:"タイムズ多摩諏訪", lat:35.63418, lng:139.45078, status:"standby", scan:4},
  {name:"タイムズ永山", lat:35.63330, lng:139.44610, status:"checked"},
  {name:"ＵＲプラザ永山", lat:35.63182, lng:139.44723, status:"standby"},
  {name:"多摩センター第３駐車場（小田急）", lat:35.62624, lng:139.42718, status:"standby", scan:5},
  {name:"タイムズ多摩センター中央第１", lat:35.62174, lng:139.42417, status:"sevenday"},
  {name:"アヴァンセ唐木田", lat:35.61578, lng:139.40835, status:"stopped"},
];

const statusColor = {
  standby:  '#00e5a0',
  checked:  '#ff4d8d',
  sevenday: '#3d9bff',
  stopped:  '#445060',
};

const statusLabel = {
  standby:  'standby',
  checked:  'checked ✓',
  sevenday: '7days_rule',
  stopped:  'stopped',
};

let map, markers = [];

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 35.638, lng: 139.445 },
    zoom: 14,
    disableDefaultUI: true,
    gestureHandling: 'greedy',
    styles: [
      { elementType: 'geometry', stylers: [{ color: '#0d1520' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#4a6070' }] },
      { elementType: 'labels.text.stroke', stylers: [{ color: '#070b12' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#1a2d40' }] },
      { featureType: 'road', elementType: 'geometry.stroke', stylers: [{ color: '#070b12' }] },
      { featureType: 'road', elementType: 'labels.text.fill', stylers: [{ color: '#3a5060' }] },
      { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#243850' }] },
      { featureType: 'road.highway', elementType: 'labels.text.fill', stylers: [{ color: '#4a7090' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#0a1824' }] },
      { featureType: 'water', elementType: 'labels.text.fill', stylers: [{ color: '#1a3040' }] },
      { featureType: 'poi', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
      { featureType: 'administrative', elementType: 'geometry', stylers: [{ color: '#1a2d40' }] },
      { featureType: 'administrative.land_parcel', stylers: [{ visibility: 'off' }] },
      { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#0d1520' }] },
    ]
  });

  // ステーションマーカー
  STATIONS.forEach(s => {
    const color = statusColor[s.status] || '#00e5a0';

    let markerEl;
    if (s.scan) {
      markerEl = document.createElement('div');
      markerEl.style.cssText = `
        width:22px; height:22px; background:#e0182d; color:#fff;
        font-size:13px; font-weight:bold; border-radius:50%;
        display:flex; align-items:center; justify-content:center;
        border:2px solid #fff; box-shadow:0 0 8px rgba(224,24,45,0.9);
        animation:scanPulse 0.8s ease-in-out infinite;
      `;
      markerEl.textContent = s.scan;
    } else {
      markerEl = document.createElement('div');
      markerEl.style.cssText = `
        width:${s.status === 'standby' ? 12 : 10}px;
        height:${s.status === 'standby' ? 12 : 10}px;
        background:${color}; border-radius:50%;
        border:2px solid rgba(255,255,255,0.5);
        box-shadow:0 0 ${s.status === 'standby' ? 6 : 3}px ${color}88;
      `;
    }

    const marker = new google.maps.marker.AdvancedMarkerElement({
      map,
      position: { lat: s.lat, lng: s.lng },
      content: markerEl,
      title: s.name
    });

    // 吹き出し
    const infoWindow = new google.maps.InfoWindow({
      content: `
        <div style="background:rgba(13,21,32,0.97);border:1px solid #1a2d40;border-radius:8px;padding:10px 14px;min-width:160px;">
          <div style="font-size:13px;font-weight:bold;color:#e8f4ff;margin-bottom:4px;">${s.name}</div>
          <div style="font-size:11px;color:${color};margin-bottom:${s.status === 'standby' ? '8px' : '0'}">${statusLabel[s.status]}</div>
          ${s.status === 'standby' ? '<button style="display:block;width:100%;padding:6px;background:rgba(0,229,160,0.1);border:1px solid #00e5a0;color:#00e5a0;font-size:12px;border-radius:4px;cursor:pointer;">点検</button>' : ''}
        </div>
      `,
      disableAutoPan: false
    });

    markerEl.addEventListener('click', () => {
      markers.forEach(m => m.iw.close());
      infoWindow.open(map, marker);
    });

    marker.iw = infoWindow;
    markers.push(marker);
  });

  // GPS現在地
  const gpsEl = document.createElement('div');
  gpsEl.style.cssText = `
    width:14px; height:14px; background:#ffe04d; border-radius:50%;
    border:2px solid rgba(255,224,77,0.4);
    animation:gpsBlink 0.8s ease-in-out infinite;
    box-shadow:0 0 8px rgba(255,224,77,0.8);
  `;
  new google.maps.marker.AdvancedMarkerElement({
    map,
    position: { lat: 35.648, lng: 139.443 },
    content: gpsEl,
    title: '現在地'
  });

  // アニメーション用CSS
  const style = document.createElement('style');
  style.textContent = `
    @keyframes scanPulse {
      0%,100% { transform:scale(1); box-shadow:0 0 8px rgba(224,24,45,0.9); }
      50% { transform:scale(1.3); box-shadow:0 0 16px rgba(224,24,45,1); }
    }
    @keyframes gpsBlink {
      0%,100% { opacity:1; }
      50% { opacity:0.2; }
    }
    .gm-style-iw { padding:0 !important; background:transparent !important; box-shadow:none !important; }
    .gm-style-iw-d { overflow:hidden !important; }
    .gm-style-iw-tc { display:none !important; }
    .gm-ui-hover-effect { display:none !important; }
    .gm-style .gm-style-iw-c { padding:0 !important; background:transparent !important; box-shadow:none !important; }
  `;
  document.head.appendChild(style);
}
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyASRe3WrsFxd7Gw7jjCXc1vajYqF8llK_k&libraries=marker&callback=initMap" async defer></script>
</body>
</html>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #070b12; font-family: 'Helvetica Neue', sans-serif; }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(7,11,18,0.97);
    border-bottom: 1px solid #1a2d40;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    z-index: 1000;
  }
  .header-title {
    font-size: 13px;
    font-weight: bold;
    color: #00e5a0;
    letter-spacing: 0.12em;
  }
  .area-tabs { display: flex; gap: 3px; margin-left: 6px; }
  .area-tab {
    padding: 3px 7px;
    font-size: 10px;
    border: 1px solid #2a3d52;
    color: #e8f4ff;
    background: transparent;
    border-radius: 4px;
    cursor: pointer;
  }
  .area-tab.active { border-color: #00e5a0; color: #00e5a0; background: rgba(0,229,160,0.08); }
  .scan-btn {
    margin-left: auto;
    padding: 4px 10px;
    font-size: 11px;
    border: 1px solid #ff4d4d;
    color: #ff4d4d;
    background: transparent;
    border-radius: 4px;
    cursor: pointer;
  }
  .update-btn {
    padding: 4px 8px;
    font-size: 11px;
    border: 1px solid #00e5a0;
    color: #00e5a0;
    background: transparent;
    border-radius: 4px;
    cursor: pointer;
  }

  #map {
    position: fixed;
    top: 52px;
    bottom: 0; left: 0; right: 0;
  }

  /* カスタムピン */
  .station-pin {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    cursor: pointer;
  }
  .pin-standby  { background: #00e5a0; box-shadow: 0 0 6px rgba(0,229,160,0.8); }
  .pin-checked  { background: #ff4d8d; box-shadow: 0 0 6px rgba(255,77,141,0.8); }
  .pin-sevenday { background: #3d9bff; box-shadow: 0 0 6px rgba(61,155,255,0.8); }
  .pin-stopped  { background: #445060; }
  .pin-scan     { 
    background: #e0182d; 
    box-shadow: 0 0 10px rgba(224,24,45,0.9);
    width: 16px; height: 16px;
    border: 2px solid #fff;
    animation: scanPulse 0.8s ease-in-out infinite;
  }
  @keyframes scanPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 10px rgba(224,24,45,0.9); }
    50% { transform: scale(1.3); box-shadow: 0 0 18px rgba(224,24,45,1); }
  }

  /* 吹き出し */
  .leaflet-popup-content-wrapper {
    background: rgba(13,21,32,0.95) !important;
    border: 1px solid #1a2d40 !important;
    border-radius: 8px !important;
    color: #e8f4ff !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    padding: 10px 14px !important;
    min-width: 160px;
  }
  .leaflet-popup-tip-container { display: none; }
  .leaflet-popup-close-button { color: #e8f4ff !important; top: 6px !important; right: 8px !important; }

  .popup-name {
    font-size: 13px;
    font-weight: bold;
    color: #e8f4ff;
    margin-bottom: 4px;
  }
  .popup-status {
    font-size: 11px;
    margin-bottom: 8px;
  }
  .popup-btn {
    display: block;
    width: 100%;
    padding: 6px;
    background: rgba(0,229,160,0.1);
    border: 1px solid #00e5a0;
    color: #00e5a0;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    text-align: center;
  }

  /* GPS現在地 */
  .gps-dot {
    width: 14px; height: 14px;
    background: #ffe04d;
    border-radius: 50%;
    border: 2px solid rgba(255,224,77,0.4);
    animation: gpsBlink 0.8s ease-in-out infinite;
  }
  @keyframes gpsBlink {
    0%,100% { opacity: 1; box-shadow: 0 0 8px rgba(255,224,77,0.8); }
    50% { opacity: 0.3; box-shadow: none; }
  }

  /* スキャンバッジ */
  .scan-badge-pin {
    background: #e0182d;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    box-shadow: 0 0 6px rgba(224,24,45,0.8);
    animation: scanPulse 0.8s ease-in-out infinite;
  }

  /* 凡例 */
  .legend {
    position: fixed;
    bottom: 20px;
    left: 12px;
    background: rgba(7,11,18,0.92);
    border: 1px solid #1a2d40;
    border-radius: 6px;
    padding: 8px 12px;
    z-index: 1000;
    font-size: 10px;
    color: #e8f4ff;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="header-title">JKS-II</div>
  <div class="area-tabs">
    <button class="area-tab active">多摩</button>
    <button class="area-tab">府中</button>
  </div>
  <button class="update-btn">更新</button>
  <button class="scan-btn">スキャン</button>
</header>

<div id="map"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#00e5a0;box-shadow:0 0 4px rgba(0,229,160,0.8)"></div>standby</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff4d8d"></div>checked</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3d9bff"></div>7days</div>
  <div class="legend-item"><div class="legend-dot" style="background:#445060"></div>stopped</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffe04d;animation:gpsBlink 0.8s infinite"></div>現在地</div>
</div>

<script>
// CartoDB DarkMatterでマップ初期化
const map = L.map('map', {
  center: [35.638, 139.445],
  zoom: 14,
  zoomControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CartoDB',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// タイル切り替え
const tiles = {
  'ダーク': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19 }),
  'ライト': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19 }),
  '標準': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
  'Smooth': L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png', { maxZoom: 19 }),
  'S.Dark': L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', { maxZoom: 19 }),
  'Voyager': L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { subdomains: 'abcd', maxZoom: 19 }),
};
let currentTile = tiles['ダーク'];
currentTile.addTo(map);

const switcher = document.createElement('div');
switcher.style.cssText = 'position:fixed;bottom:20px;right:12px;z-index:1000;display:flex;flex-direction:column;gap:4px;';
Object.keys(tiles).forEach(name => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.style.cssText = 'padding:4px 10px;font-size:10px;border:1px solid #2a3d52;color:#e8f4ff;background:rgba(7,11,18,0.92);border-radius:4px;cursor:pointer;';
  if (name === 'ダーク') { btn.style.borderColor = '#00e5a0'; btn.style.color = '#00e5a0'; }
  btn.onclick = () => {
    map.removeLayer(currentTile);
    currentTile = tiles[name];
    currentTile.addTo(map);
    document.querySelectorAll('.tile-btn').forEach(b => { b.style.borderColor = '#2a3d52'; b.style.color = '#e8f4ff'; });
    btn.style.borderColor = '#00e5a0'; btn.style.color = '#00e5a0';
  };
  btn.className = 'tile-btn';
  switcher.appendChild(btn);
});
document.body.appendChild(switcher);

// サンプルステーションデータ（実際のデータの一部）
const stations = [
  {name:"多摩一ノ宮", lat:35.65221, lng:139.44115, status:"standby", scan:1},
  {name:"ＡＯＫＩ聖蹟桜ヶ丘店", lat:35.65185, lng:139.43947, status:"standby", scan:2},
  {name:"聖蹟桜ヶ丘モーリン駐車場", lat:35.64960, lng:139.44426, status:"checked"},
  {name:"タイムズ聖蹟桜ヶ丘駅前交差点", lat:35.65051, lng:139.44547, status:"standby", scan:3},
  {name:"聖蹟桜ヶ丘駅北第２", lat:35.65252, lng:139.44595, status:"sevenday"},
  {name:"パトリア桜ヶ丘", lat:35.65285, lng:139.44469, status:"standby"},
  {name:"タイムズ多摩諏訪", lat:35.63418, lng:139.45078, status:"standby", scan:4},
  {name:"タイムズ永山", lat:35.63330, lng:139.44610, status:"checked"},
  {name:"ＵＲプラザ永山", lat:35.63182, lng:139.44723, status:"standby"},
  {name:"多摩センター第３駐車場（小田急）", lat:35.62624, lng:139.42718, status:"standby", scan:5},
  {name:"タイムズ多摩センター中央第１", lat:35.62174, lng:139.42417, status:"sevenday"},
  {name:"アヴァンセ唐木田", lat:35.61578, lng:139.40835, status:"stopped"},
];

const statusColor = {
  standby:  '#00e5a0',
  checked:  '#ff4d8d',
  sevenday: '#3d9bff',
  stopped:  '#445060',
};

const statusLabel = {
  standby:  'standby',
  checked:  'checked ✓',
  sevenday: '7days_rule',
  stopped:  'stopped',
};

stations.forEach(s => {
  const color = statusColor[s.status] || '#00e5a0';
  let iconHtml;

  if (s.scan) {
    iconHtml = `<div class="scan-badge-pin">${s.scan}</div>`;
  } else {
    iconHtml = `<div class="station-pin pin-${s.status}"></div>`;
  }

  const icon = L.divIcon({
    html: iconHtml,
    className: '',
    iconSize: s.scan ? [22, 22] : [12, 12],
    iconAnchor: s.scan ? [11, 11] : [6, 6],
    popupAnchor: [0, -10]
  });

  const marker = L.marker([s.lat, s.lng], { icon }).addTo(map);

  const popupColor = statusColor[s.status] || '#00e5a0';
  marker.bindPopup(`
    <div class="popup-name">${s.name}</div>
    <div class="popup-status" style="color:${popupColor}">${statusLabel[s.status] || s.status}</div>
    ${s.status === 'standby' ? '<button class="popup-btn">点検</button>' : ''}
  `, { maxWidth: 200, minWidth: 160 });
});

// GPS現在地（デモ用）
const gpsIcon = L.divIcon({
  html: '<div class="gps-dot"></div>',
  className: '',
  iconSize: [14, 14],
  iconAnchor: [7, 7]
});
L.marker([35.648, 139.443], { icon: gpsIcon }).addTo(map);
</script>
</body>
</html>
